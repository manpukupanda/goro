services:
  goro:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    volumes:
      - ..:/app
      - ../data:/app/data
      - goro-go-build-cache:/root/.cache/go-build
      - goro-go-mod-cache:/go/pkg/mod
    ports:
      - "5600:5600"
      - "5601:5601"
    command: ["go", "run", "./cmd/goro", "--console", "--api-port", "5600", "--console-port", "5601"]
    environment:
      # S3 credentials — supplied via environment variables to avoid storing
      # secrets in the config file.
      - GORO_S3_ACCESS_KEY=${GORO_S3_ACCESS_KEY:?GORO_S3_ACCESS_KEY must be set}
      - GORO_S3_SECRET_KEY=${GORO_S3_SECRET_KEY:?GORO_S3_SECRET_KEY must be set}
      # Set GORO_SECURE_LINK_SECRET to a strong random value before starting.
      # The same value must be set on the nginx container below.
      - GORO_SECURE_LINK_SECRET=${GORO_SECURE_LINK_SECRET:?GORO_SECURE_LINK_SECRET must be set}
      # API key required to access the public API endpoints.
      - GORO_API_KEY=${GORO_API_KEY:?GORO_API_KEY must be set}
      # Admin console credentials — change before production use.
      - GORO_ADMIN_USER=${GORO_ADMIN_USER:-admin}
      - GORO_ADMIN_PASSWORD=${GORO_ADMIN_PASSWORD:?GORO_ADMIN_PASSWORD must be set}
      # Store the database inside the mounted data volume.
      - GORO_DB_PATH=/app/data/goro.db

  nginx:
    image: nginx
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template
    ports:
      - "80:80"
    environment:
      # Must match the GORO_SECURE_LINK_SECRET set on the goro service.
      - SECURE_LINK_SECRET=${GORO_SECURE_LINK_SECRET:?GORO_SECURE_LINK_SECRET must be set}

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${GORO_S3_ACCESS_KEY:?GORO_S3_ACCESS_KEY must be set}
      - MINIO_ROOT_PASSWORD=${GORO_S3_SECRET_KEY:?GORO_S3_SECRET_KEY must be set}
    volumes:
      - minio_data:/data

volumes:
  goro-go-build-cache:
  goro-go-mod-cache:
  minio_data: