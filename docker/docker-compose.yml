services:
  goro:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    volumes:
      - ..:/app
      - ../data:/app/data
      - goro-go-build-cache:/root/.cache/go-build
      - goro-go-mod-cache:/go/pkg/mod
    ports:
      - "8080:8080"
    environment:
      - S3_ENDPOINT=http://minio:9000

  nginx:
    image: nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"

  minio:
    image: minio/minio
    command: server /data
    ports:
      - "9000:9000"
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=minio123

volumes:
  goro-go-build-cache:
  goro-go-mod-cache: